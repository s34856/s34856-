<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>หน้าแนะนำตัวของฉัน</title>
<style>
body {
background-color: #C05344; color: #333;
text-align: center; padding: 50px;

}
.card {
background: white; border-radius: 60px;
box-shadow: 0 4px 8px rgba(0,0,0,0.1);
max-width: 500px; margin: 0 auto; padding: 30px;

}
h1 { color: #44C0B8; }
p { font-size: 18px; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
<h1>ยินดีต้อนรับสู่โปรไฟล์ของฉัน </h1>
<p>สวัสดีครับ! ผมชื่อ <strong>ทัตธน พลรัตน์ (Thatton)</strong></p>
<p>ขณะนี้กำลังศึกษา/สนใจด้าน ฟิสิกส์และคณิตศาสตร์</p>
<p>คณิตศาสตร์แคลคูลัส</p>
</div>
</body>
</html>
